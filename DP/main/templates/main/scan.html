<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Сканиране на QR</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="mb-3"><a href="{% url 'main:index' %}" class="btn btn-secondary mt-3">Назад</a></div>

        <h2>Проверка (Сканиране) на билет</h2>
        <div class="card p-4 mt-4 shadow-sm">
            <!-- Важно: enctype="multipart/form-data" е нужно за качване на файлове -->
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="qr_image" class="form-label">Качи снимка на QR код:</label>
                    <input class="form-control" type="file" id="qr_image" name="qr_image" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-success">Сканирай и Провери</button>
            </form>
        </div>

        <!-- Тук ще показваме резултата от сканирането в следващата стъпка -->
        {% if scan_result %}
            <div class="alert mt-4 {% if scan_success %}alert-success{% else %}alert-danger{% endif %}">
                <h4>{{ message }}</h4>
                {% if scanned_code %}<p>Разчетен код: {{ scanned_code }}</p>{% endif %}
            </div>
        {% endif %}
    </div>
</body>
</html>
